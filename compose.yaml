services:
  postgis:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: aeroroute
      POSTGRES_USER: aeroroute
      POSTGRES_PASSWORD: aeroroute
    ports: ["${AEROROUTE_POSTGRES_PORT:-55432}:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aeroroute -d aeroroute"]
      interval: 5s
      timeout: 3s
      retries: 10
  fake-explanations:
    image: kennethreitz/httpbin
    profiles: ["fake-services"]
